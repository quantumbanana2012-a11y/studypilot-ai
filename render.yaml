services:
  - type: web
    name: synapsedeck-ai
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MODEL_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: COMPATIBLE_API_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: COMPATIBLE_MODEL
        value: openrouter/free
      - key: COMPATIBLE_FALLBACK_MODELS
        value: google/gemma-3-27b-it:free,meta-llama/llama-3.3-70b-instruct:free,mistralai/mistral-7b-instruct:free
      - key: MODEL_TIMEOUT_MS
        value: 35000
      - key: PUBLIC_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: COMPATIBLE_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: DATABASE_PATH
        value: ./data/synapsedeck-db.json
      - key: ADS_ENABLED
        value: false
      - key: ADSENSE_CLIENT_ID
        sync: false
      - key: ADSENSE_SIDEBAR_SLOT
        sync: false
      - key: ADSENSE_WORKSPACE_SLOT
        sync: false
